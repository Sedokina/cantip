name: Docker image

# Build the generic cantip-host image and push it to GitHub Container Registry.
#
# The image scaffolds the app via `npx create-cantip@<version>`, so that version
# must already be on npm. To avoid racing the npm publish, this workflow runs AFTER
# the Release workflow COMPLETES (workflow_run) rather than off the tag directly —
# so by the time we build, the Release job has published the engine. A
# workflow_dispatch is also provided for manual/ad-hoc builds of a given version.
# Auth uses the built-in GITHUB_TOKEN — no extra secret.

on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'cantip version to build (e.g. 0.6.0). Tags the image with it + latest.'
        required: false
        default: 'latest'

jobs:
  build-push:
    name: Build & push to ghcr.io
    runs-on: ubuntu-latest
    # On the workflow_run path, only build if the Release actually SUCCEEDED (don't
    # publish an image for a failed/cancelled release). Manual dispatch always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive the cantip version
        id: ver
        # workflow_run (after Release): use the version from packages/cantip's
        # package.json on the checked-out default branch — that's the version the
        # release just published, and it's more reliable than head_branch for a
        # tag-triggered upstream run. Manual run: use the `version` input.
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            ver="$(node -p "require('./packages/cantip/package.json').version")"
            echo "cantip=${ver}" >> "$GITHUB_OUTPUT"
          else
            echo "cantip=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # Belt-and-suspenders: even after Release succeeds, a just-published version
      # can take a moment to propagate across npm's CDN edges. Poll briefly so the
      # build never hits a transient ETARGET.
      - name: Wait for create-cantip@<version> on npm
        if: steps.ver.outputs.cantip != 'latest'
        run: |
          ver="${{ steps.ver.outputs.cantip }}"
          for i in $(seq 1 40); do
            if npm view "create-cantip@${ver}" version >/dev/null 2>&1; then
              echo "create-cantip@${ver} is available."
              exit 0
            fi
            echo "waiting for create-cantip@${ver} on npm ($i)…"
            sleep 15
          done
          echo "create-cantip@${ver} did not appear on npm in time." >&2
          exit 1

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: the version (e.g. 0.6.0) + `latest`. The repo owner is lowercased for
      # the ghcr path (ghcr.io/<owner>/cantip-host).
      - name: Compute image tags
        id: tags
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          ver="${{ steps.ver.outputs.cantip }}"
          repo="ghcr.io/${owner}/cantip-host"
          if [ "$ver" = "latest" ]; then
            echo "tags=${repo}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${repo}:${ver},${repo}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            CANTIP_VERSION=${{ steps.ver.outputs.cantip }}
            WITH_MERMAID=true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
