name: Docker image

# Build the generic cantip-host image and push it to GitHub Container Registry on
# every v* tag (and `latest`). Auth uses the built-in GITHUB_TOKEN — no extra
# secret. The image scaffolds the app for the tagged cantip version, so the tag's
# engine must already be published to npm (the Release workflow does that in
# parallel; the Dockerfile's `npx create-cantip@<version>` will retry until it's
# available).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'cantip version to build (e.g. 0.6.0). Tags the image with it + latest.'
        required: false
        default: 'latest'

jobs:
  build-push:
    name: Build & push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive the cantip version
        id: ver
        # Tag push: v0.6.0 -> 0.6.0. Manual run: use the `version` input
        # (defaults to `latest`). The image is tagged with this value + `latest`.
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "cantip=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "cantip=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # The Release (npm) and this Docker workflow both trigger off the same v*
      # tag and run IN PARALLEL. The image build does `npx create-cantip@<version>`,
      # so it must wait until that version is actually on npm — otherwise it builds
      # against a missing/old version (or no-ops). Poll npm before building.
      - name: Wait for create-cantip@<version> on npm
        if: steps.ver.outputs.cantip != 'latest'
        run: |
          ver="${{ steps.ver.outputs.cantip }}"
          for i in $(seq 1 60); do
            if npm view "create-cantip@${ver}" version >/dev/null 2>&1; then
              echo "create-cantip@${ver} is available."
              exit 0
            fi
            echo "waiting for create-cantip@${ver} on npm ($i)…"
            sleep 15
          done
          echo "create-cantip@${ver} did not appear on npm in time." >&2
          exit 1

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: the version (e.g. 0.6.0) + `latest`. The repo owner is lowercased for
      # the ghcr path (ghcr.io/<owner>/cantip-host).
      - name: Compute image tags
        id: tags
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          ver="${{ steps.ver.outputs.cantip }}"
          repo="ghcr.io/${owner}/cantip-host"
          if [ "$ver" = "latest" ]; then
            echo "tags=${repo}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${repo}:${ver},${repo}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            CANTIP_VERSION=${{ steps.ver.outputs.cantip }}
            WITH_MERMAID=true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
